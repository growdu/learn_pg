# E2E test environment.
# Services: postgres (shared DB), backend (API), frontend (nginx)
#
# Brings up the stack and reuses prebuilt images where possible.
# Local usage (with rebuild):
#   cd frontend && pnpm install --frozen-lockfile && pnpm run build
#   docker compose -f docker-compose.e2e.yml up --build
#   cd ../e2e && pnpm install && pnpm test
#
# CI usage (reuse backend image from backend-build job, mount dist):
#   docker compose -f docker-compose.e2e.yml up --wait
#   (frontend dist must be present in frontend/dist; the container
#   just mounts it read-only instead of running a build stage)

services:
  postgres:  # Shared DB for both backend and E2E test queries
    image: docker.m.daocloud.io/library/postgres:16
    container_name: pgv-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
    ports:
      # Host port is overridable for environments that already have
      # something on 5432. Tests don't connect to PG directly — they
      # hit the backend on 3010 (also overridable) which talks to PG
      # over the docker network. Default 5432 matches the original
      # CI contract; override locally with PG_E2E_PG_PORT=5434 etc.
      - "${PG_E2E_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - pgv-e2e-net
    volumes:
      - pgv_e2e_data:/var/lib/postgresql/data

  backend:
    # Reuse prebuilt image when available; fall back to building from
    # ./backend (with the GitHub module-download fallback baked into
    # the Dockerfile) when the image is missing.
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: learn_pg-backend:latest
    container_name: pgv-e2e-backend
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3000
      COLLECTOR_WS_URL: ws://collector:8090
      PG_DATA_DIR: /var/lib/postgresql/data
    ports:
      - "${PG_E2E_API_PORT:-3010}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - pgv-e2e-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The host's docker socket is root:docker with mode 0660. The image
    # ships a non-root `app` user, so we add it to the docker group
    # (gid 971 on most hosts; override via PG_DOCKER_GID env if it
    # differs in your environment) so provision/discovery can talk
    # to the daemon. CI runners usually have this set up by default.
    group_add:
      - "${PG_DOCKER_GID:-971}"
    volumes:
      - pgv_e2e_data:/var/lib/postgresql/data:ro
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    # Plain nginx + the prebuilt dist mounted in. This avoids needing a
    # node build stage in the e2e container — the dist is built once
    # on the host (or in CI) and reused.
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: pgv-e2e-frontend
    ports:
      # 3011 on the host (avoid colliding with another dev server on 3001).
      - "${PG_E2E_FE_PORT:-3001}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pgv-e2e-net
    volumes:
      - ./frontend/nginx.e2e.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  pgv_e2e_data:

networks:
  pgv-e2e-net:
    name: pgv-e2e-net
    driver: bridge
