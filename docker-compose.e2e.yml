version: '3.8'

# E2E test environment - provides PostgreSQL instance for testing
services:
  postgres_for_e2e:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - e2e-network

networks:
  e2e-network:
    name: pg-visualizer-e2e
    driver: bridge