# Unified deployment: start all services together
# Usage: docker-compose -f deploy/docker-compose.yml up -d

services:
  postgres:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    command:
      - "postgres"
      - "-cshared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}"
      - "-cmax_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pgv-net

  backend:
    build:
      context: ${BACKEND_BUILD_CONTEXT:-../../backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-backend
    environment:
      PG_HOST: ${POSTGRES_HOST:-postgres}
      PG_PORT: ${POSTGRES_PORT:-5432}
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_DATABASE: ${POSTGRES_DB:-postgres}
      API_PORT: ${BACKEND_API_PORT:-3000}
      WS_PORT: ${BACKEND_WS_PORT:-8080}
      COLLECTOR_WS_URL: "ws://${COLLECTOR_HOST:-collector}:${COLLECTOR_PORT:-8090}"
      PG_DATA_DIR: ${PG_DATA_DIR:-/var/lib/postgresql/data}
      APP_ENV: ${APP_ENV:-development}
      APP_EXTERNAL_HOST: ${APP_EXTERNAL_HOST:-localhost}
    ports:
      - "${BACKEND_API_PORT:-3000}:${BACKEND_API_PORT:-3000}"
      - "${BACKEND_WS_PORT:-8080}:${BACKEND_WS_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${BACKEND_API_PORT:-3000}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pgv-net

  frontend:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-../../frontend}
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-frontend
    environment:
      BACKEND_API_URL: http://${BACKEND_HOST:-backend}:${BACKEND_API_PORT:-3000}
      BACKEND_WS_URL: ws://${BACKEND_HOST:-backend}:${BACKEND_WS_PORT:-3000}/ws
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pgv-net

  collector:
    build:
      context: ${COLLECTOR_BUILD_CONTEXT:-../../collector}
      dockerfile: ${COLLECTOR_DOCKERFILE:-Dockerfile}
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-collector
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      BACKEND_WS_URL: "ws://${BACKEND_HOST:-127.0.0.1}:${BACKEND_WS_PORT:-3000}/ws"
      COLLECTOR_PORT: ${COLLECTOR_PORT:-8090}
      PG_DATA_DIR: ${PG_DATA_DIR:-/var/lib/postgresql/data}
      USE_EBPF: ${USE_EBPF:-false}
      BPF_OBJECT_PATH: ${BPF_OBJECT_PATH:-/app/probes/probe.bpf.o}
      POSTGRES_BIN: ${POSTGRES_BIN:-/usr/local/bin/postgres}
      POSTGRES_PID: ${POSTGRES_PID:-}
    network_mode: host
    pid: host
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp=unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/bpf:/sys/fs/bpf
      - pg_data:${PG_DATA_DIR:-/var/lib/postgresql/data}
    depends_on:
      - postgres
    profiles:
      - linux-only
    networks:
      - pgv-net

volumes:
  pg_data:

networks:
  pgv-net:
    name: pgv-net
