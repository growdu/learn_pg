version: "3.9"

# Cloud deployment: uses external PostgreSQL (RDS)
# Start all services: docker-compose -f docker-compose.cloud.yml up -d

services:
  backend:
    build:
      context: ${BACKEND_BUILD_CONTEXT:-../../backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-backend
    environment:
      PG_HOST: ${POSTGRES_HOST:-postgres}
      PG_PORT: ${POSTGRES_PORT:-5432}
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_DATABASE: ${POSTGRES_DB:-postgres}
      API_PORT: ${BACKEND_API_PORT:-3000}
      COLLECTOR_WS_URL: "ws://${COLLECTOR_HOST:-collector}:${COLLECTOR_PORT:-8090}"
      PG_DATA_DIR: ${PG_DATA_DIR:-/var/lib/postgresql/data}
      APP_ENV: ${APP_ENV:-cloud}
      APP_EXTERNAL_HOST: ${APP_EXTERNAL_HOST:-localhost}
    ports:
      - "${BACKEND_API_PORT:-3000}:${BACKEND_API_PORT:-3000}"
    restart: unless-stopped
    networks:
      - ${COMPOSE_NETWORK:-pgv-net}

  frontend:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-../../frontend}
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    container_name: ${COMPOSE_PROJECT_NAME:-pgv}-frontend
    environment:
      BACKEND_API_URL: http://${BACKEND_HOST:-backend}:${BACKEND_API_PORT:-3000}
      BACKEND_WS_URL: ws://${BACKEND_HOST:-backend}:${BACKEND_API_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ${COMPOSE_NETWORK:-pgv-net}

networks:
  ${COMPOSE_NETWORK:-pgv-net}:
    name: ${COMPOSE_NETWORK:-pgv-net}
    external: ${COMPOSE_NETWORK_EXTERNAL:-false}