version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: pgv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - "postgres"
      - "-cshared_buffers=256MB"
      - "-cmax_connections=100"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgv-backend
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3000
      WS_PORT: 8080
      COLLECTOR_WS_URL: ws://collector:8090
      PG_DATA_DIR: /var/lib/postgresql/data
    ports:
      - "3000:3000"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgv-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: pgv-collector
    environment:
      BACKEND_WS_URL: ws://backend:8080
      COLLECTOR_PORT: 8090
      PG_DATA_DIR: /var/lib/postgresql/data
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp=unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - pg_data:/var/lib/postgresql/data
    depends_on:
      - postgres
    profiles:
      - "linux-only"

volumes:
  pg_data:

networks:
  default:
    name: pgv-net