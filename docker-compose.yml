version: "3.9"

services:
  postgres:
    image: learn_pg/postgres:18.3-debug
    container_name: pgv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
    command:
      - "postgres"
      - "-cshared_buffers=256MB"
      - "-cmax_connections=100"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      # Expose postgres binary to host via bind mount so collector (host mode) can access it
      - /opt/postgres/bin:/usr/lib/postgresql/18/bin:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pgv-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgv-backend
    ports:
      - "3000:3000"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3000
      COLLECTOR_WS_URL: ws://collector:8090
      PG_DATA_DIR: /var/lib/postgresql
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pg_data:/var/lib/postgresql:ro
    networks:
      - pgv-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgv-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pgv-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3

  collector:
    image: pg-collector:fix
    container_name: pgv-collector
    environment:
      # network_mode=host: collector runs in host network, accesses postgres via host paths
      # Backend: use host.docker.internal (host network allows DNS resolution of this)
      RUST_BACKTRACE: "1"
      RUST_LOG: "debug"
      BACKEND_WS_URL: ws://host.docker.internal:3000/ws
      COLLECTOR_PORT: 8090
      # WAL data dir: /var/lib/postgresql/data (named volume, mounted at this path in postgres container)
      PG_DATA_DIR: /var/lib/postgresql/data
      USE_EBPF: "true"
      BPF_OBJECT_PATH: /app/probes/probe.bpf.o
      # Host binary path (bind-mounted from postgres container via /opt/postgres/bin on host)
      POSTGRES_BIN: /opt/postgres/bin/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: host
    pid: host
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp:unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/bpf:/sys/fs/bpf
      # WAL data dir accessible on host (named volume, shared with postgres container)
      - pg_data:/var/lib/postgresql/data
      # Postgres binary (bind mount from host; named volume can't expose arbitrary paths)
      - /opt/postgres/bin:/opt/postgres/bin:ro
    depends_on:
      - postgres
    profiles:
      - "linux-only"

volumes:
  pg_data:

networks:
  pgv-net:
