version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: pgv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
    command:
      - "postgres"
      - "-cshared_buffers=256MB"
      - "-cmax_connections=100"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pgv-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgv-backend
    ports:
      - "3000:3000"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3000
      COLLECTOR_WS_URL: ws://collector:8090
      PG_DATA_DIR: /var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pg_data:/var/lib/postgresql:ro
    networks:
      - pgv-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgv-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pgv-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3

  collector:
    image: pg-collector:fix
    container_name: pgv-collector
    environment:
      # network_mode=host 时，必须通过 host.docker.internal 访问宿主机端口。
      # 不要使用 Docker 服务名（如 backend），host 网络下无法解析。
      BACKEND_WS_URL: ws://host.docker.internal:3000/ws
      COLLECTOR_PORT: 8090
      PG_DATA_DIR: /var/lib/postgresql/data
      USE_EBPF: "true"
      BPF_OBJECT_PATH: /app/probes/probe.bpf.o
      # 必须与目标 PG 进程的二进制版本一致，probe 符号从该二进制解析
      # 注意: 该路径必须与 volumes 中的挂载路径一致
      POSTGRES_BIN: /usr/lib/postgresql/18/bin/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: host
    pid: host
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp:unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/bpf:/sys/fs/bpf
      - /usr/lib/postgresql/18/bin/postgres:/usr/lib/postgresql/18/bin/postgres:ro
      - pg_data:/var/lib/postgresql
    depends_on:
      - postgres
    profiles:
      - "linux-only"

volumes:
  pg_data:

networks:
  pgv-net:
