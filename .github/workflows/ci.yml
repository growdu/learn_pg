name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----- Tests (run on every PR, in parallel) --------------------------

  backend-lint:
    name: Backend lint (go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - name: go vet
        working-directory: ./backend
        run: go vet ./...

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: ./backend
        run: go build ./...
      - name: Unit tests
        working-directory: ./backend
        run: go test -count=1 -timeout 60s ./...
      - name: Race-detector run
        working-directory: ./backend
        # -short: skip any test that opts in to long mode. -race: catch
        # data races in middleware stacks. The reporter and rate-limit
        # tests are the main beneficiaries.
        run: go test -count=1 -race -short -timeout 120s ./internal/middleware/... ./internal/reporter/... ./internal/ratelimit/... ./internal/metrics/... ./internal/ws/...

  backend-build:
    name: Backend build (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: learn_pg-backend:ci
          # Build args: stub the values that would normally come from
          # git. They only show up in /version, not in the binary
          # behaviour, so any non-empty string is fine.
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GO_VERSION=ci

  frontend-lint:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: ./frontend
      - run: npx tsc --noEmit
        working-directory: ./frontend

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: ./frontend
      - run: npm test -- --run
        working-directory: ./frontend

  collector-test:
    name: Collector tests
    runs-on: ubuntu-latest
    if: runner.os == 'Linux'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo test
        working-directory: ./collector

  compose-config:
    name: Compose files valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate prod compose
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config --quiet

  # ----- Push to GHCR (only on push to main, after all tests pass) -----

  build-and-push:
    name: Build and push images
    needs:
      - backend-lint
      - backend-test
      - backend-build
      - frontend-lint
      - frontend-test
      - collector-test
      - compose-config
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GO_VERSION=release

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
