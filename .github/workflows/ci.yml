name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----- Tests (run on every PR, in parallel) --------------------------

  backend-lint:
    name: Backend lint (go vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - name: go vet
        working-directory: ./backend
        run: go vet ./...

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: ./backend
        run: go build ./...
      - name: Unit tests
        working-directory: ./backend
        run: go test -count=1 -timeout 60s ./...
      - name: Race-detector run
        working-directory: ./backend
        # -short: skip any test that opts in to long mode. -race: catch
        # data races in middleware stacks. The reporter and rate-limit
        # tests are the main beneficiaries.
        run: go test -count=1 -race -short -timeout 120s ./internal/middleware/... ./internal/reporter/... ./internal/ratelimit/... ./internal/metrics/... ./internal/ws/...

  backend-build:
    name: Backend build (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: learn_pg-backend:ci
          # Build args: stub the values that would normally come from
          # git. They only show up in /version, not in the binary
          # behaviour, so any non-empty string is fine.
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GO_VERSION=ci

  backend-smoke:
    # End-to-end smoke: start a real PG, run the backend binary, hit the
    # public ops + workspace endpoints. Cheap (≈1 min) and gives a real
    # signal that the build, config, and HTTP wiring still work together.
    name: Backend smoke (start + health)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Point the backend at the service container. The default
      # WorkspaceFilePath is ./data/workspace_projects.json, which the
      # backend creates on first write — the smoke run is read-only so
      # the file stays absent.
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: "3000"
      # Skip the eBPF collector handshake in CI — there is no kernel
      # probe here, and COLLECTOR_WS_URL defaults to ws://localhost:8090
      # which would just retry forever.
      ENABLE_EBPF: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: ./backend
        run: go build -o /tmp/pgv-backend ./cmd/server
      - name: Start backend
        working-directory: ./backend
        run: |
          /tmp/pgv-backend > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> "$GITHUB_ENV"
          # Wait up to 30s for /livez
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/livez > /dev/null; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::backend did not become ready within 30s"
          echo "--- backend log ---"
          cat /tmp/backend.log
          exit 1
      - name: Smoke checks
        run: |
          set -e
          echo "--- /livez ---"
          curl -sf -w "\nstatus=%{http_code}\n" http://localhost:3000/livez
          echo "--- /version ---"
          curl -sf -w "\nstatus=%{http_code}\n" http://localhost:3000/version
          echo "--- /health ---"
          curl -sf -w "\nstatus=%{http_code}\n" http://localhost:3000/health
          echo "--- /api/workspace/projects ---"
          curl -sf -w "\nstatus=%{http_code}\n" http://localhost:3000/api/workspace/projects
          echo "--- /metrics (first 5 lines) ---"
          curl -sf http://localhost:3000/metrics | head -5
      - name: Stop backend
        if: always()
        run: |
          if [ -n "${BACKEND_PID:-}" ]; then
            kill "$BACKEND_PID" 2>/dev/null || true
            wait "$BACKEND_PID" 2>/dev/null || true
          fi

  frontend-lint:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - run: pnpm install --frozen-lockfile
        working-directory: ./frontend
      - run: pnpm typecheck
        working-directory: ./frontend

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - run: pnpm install --frozen-lockfile
        working-directory: ./frontend
      - run: pnpm test --run
        working-directory: ./frontend

  collector-test:
    name: Collector tests
    runs-on: ubuntu-latest
    if: runner.os == 'Linux'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo test
        working-directory: ./collector

  compose-config:
    name: Compose files valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate prod compose
        run: docker compose -f docker-compose.prod.yml config --quiet
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config --quiet

  # ----- Push to GHCR (only on push to main, after all tests pass) -----

  build-and-push:
    name: Build and push images
    needs:
      - backend-lint
      - backend-test
      - backend-build
      - backend-smoke
      - frontend-lint
      - frontend-test
      - collector-test
      - compose-config
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GO_VERSION=release

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
