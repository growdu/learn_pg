version: "3.9"

services:
  # 被观测的 PostgreSQL 实例
  postgres:
    image: postgres:18
    container_name: pgv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    command:
      - "postgres"
      - "-cshared_buffers=256MB"
      - "-cmax_connections=100"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Go 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pgv-backend
    environment:
      # Backend 连接 Postgres 使用 Docker 内部网络 (容器间通信)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3010
      WS_PORT: 8100
      COLLECTOR_WS_URL: ws://collector:8090
    ports:
      - "3010:3010"
      - "8100:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # eBPF 采集器（仅 Linux，需要特权）
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile.dev
    container_name: pgv-collector
    environment:
      BACKEND_WS_URL: ws://backend:8080
      COLLECTOR_PORT: 8090
      PG_DATA_DIR: /var/lib/postgresql/data
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp=unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - pg_data:/var/lib/postgresql
    depends_on:
      - postgres
    profiles:
      - "linux-only"

  # 前端（开发模式）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pgv-frontend
    network_mode: host
    environment:
      VITE_API_URL: http://192.168.3.99:3010
      VITE_WS_URL: ws://192.168.3.99:8100
    ports:
      - "5174:5173"
    depends_on:
      - backend
    command: ["pnpm", "dev", "--host"]

volumes:
  pg_data:

networks:
  default:
    name: pgv-net
