version: "3.9"

services:
  # 被观测的 PostgreSQL 实例
  postgres:
    image: postgres:18
    container_name: pgv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    command:
      - "postgres"
      - "-cshared_buffers=256MB"
      - "-cmax_connections=100"
      - "-clog_min_messages=log"
      - "-cwal_level=logical"
      - "-cmax_wal_senders=10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Go 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pgv-backend
    environment:
      # Backend 连接 Postgres 使用 Docker 内部网络 (容器间通信)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres
      API_PORT: 3010
      COLLECTOR_WS_URL: ws://collector:8090
      PG_DATA_DIR: /var/lib/postgresql/data
    ports:
      - "3010:3010"
    volumes:
      - pg_data:/var/lib/postgresql
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # eBPF 采集器（仅 Linux，需要特权）
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile.dev
    container_name: pgv-collector
    environment:
      # network_mode=host 时，必须通过 host.docker.internal 访问宿主机端口
      # 注意：backend 在宿主机端口 3000 暴露
      BACKEND_WS_URL: ws://host.docker.internal:3000/ws
      COLLECTOR_PORT: 8090
      PG_DATA_DIR: /var/lib/postgresql/data
      USE_EBPF: "true"
      BPF_OBJECT_PATH: /app/probes/probe.bpf.o
      POSTGRES_BIN: /usr/lib/postgresql/18/bin/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: host
    pid: host
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - NET_RAW
      - NET_BIND_SERVICE
    security_opt:
      - seccomp:unconfined
    volumes:
      - /lib/modules:/lib/modules:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/fs/bpf:/sys/fs/bpf
      - pg_data:/var/lib/postgresql
    depends_on:
      - postgres
    profiles:
      - "linux-only"

  # Frontend（使用预编译的 dist + nginx）
  frontend:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: pgv-frontend
    ports:
      - "3001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pg_data:

networks:
  pgv-net:
